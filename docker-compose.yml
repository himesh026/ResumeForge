version: '3.9'

services:
  # ─────────────────────────────────────────
  # Main Next.js Application
  # ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "file:/app/data/prod.db"
      AUTH_SECRET: "${AUTH_SECRET:-change-this-secret-in-production}"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3000}"

      # AI Mode: "cloud" or "local"
      AI_MODE: "${AI_MODE:-cloud}"

      # Cloud LLM
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-2.0-flash}"

      # Local LLM (Ollama service below)
      OLLAMA_BASE_URL: "http://ollama:11434"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3}"

      # Email
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      EMAIL_FROM: "${EMAIL_FROM:-}"

      UPLOAD_DIR: "/app/uploads"
      OUTPUT_DIR: "/app/outputs"
    volumes:
      - app_data:/app/data
      - app_uploads:/app/uploads
      - app_outputs:/app/outputs
    depends_on:
      - ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/auth/me"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────
  # Ollama — Local LLM inference
  # Only used when AI_MODE=local
  # ─────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    # Uncomment for GPU support (NVIDIA):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  app_data:
  app_uploads:
  app_outputs:
  ollama_models:
